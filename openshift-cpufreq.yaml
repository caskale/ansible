---
- name: modify the cpufreq values for openshift nodes
  hosts: openshift
  become: true

  tasks:
    - name: set cpufreq scaling governor to powersave and disable boost
      ansible.builtin.shell: |
        echo powersave |  tee /sys/devices/system/cpu/cpu*/cpufreq/scaling_governor
        echo 0 |  tee /sys/devices/system/cpu/cpu*/cpufreq/boost
